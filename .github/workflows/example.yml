name: Strobes Security Scan

on:
  push:
    branches: ['**']
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: strobes-co/strobes-sast-scan-action@v1
        with:
          webhook-url: https://strobes.example.com/api/v1/webhooks/receive/00000000-0000-0000-0000-000000000000
          webhook-secret: ${{ secrets.STROBES_WEBHOOK_SECRET }}
